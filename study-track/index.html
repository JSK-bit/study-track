<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#f5f0eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <title>学习印记</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <h1 class="app-title">学习印记</h1>
        <span class="header-date" id="headerDate">7月2日 周四</span>
      </div>
    </header>
    <main id="view-container">

      <div id="view-home" class="view active">
        <section class="section">
          <div class="section-head">
            <h2 class="section-title">今日课程</h2>
            <span class="section-count">3 节</span>
          </div>
          <div class="card schedule-list" id="homeScheduleList">
            <div class="placeholder" style="padding:32px 0"><p>还没有课程</p></div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title">今日计划</h2>
            <button class="btn-link" onclick="openAddPlan()">+ 添加</button>
          </div>
          <div class="card plan-list" id="homePlanList">
            <div class="placeholder" style="padding:32px 0"><p>还没有计划</p></div>
          </div>
        </section>

        <section class="section">
          <button class="btn-checkin" id="btnCheckin">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            开始今日打卡
          </button>
        </section>
      </div>

      <div id="view-checkin" class="view">
        <section class="section">
          <div class="section-head">
            <h2 class="section-title">今日学习</h2>
          </div>
          <div class="card" style="padding:24px;text-align:center">
            <div id="sessionStatus" style="font-size:16px;font-weight:600;color:var(--text-secondary)">今日尚未学习</div>
            <div id="sessionTimer" style="font-size:42px;font-weight:700;color:var(--accent);margin:16px 0;display:none;font-variant-numeric:tabular-nums">00:00:00</div>
            <button class="btn-checkin" id="btnSessionAction" onclick="toggleSession()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              开始学习
            </button>
          </div>
        </section>

        <!-- 专注计时 -->
        <section class="section" id="focusSection">
          <div class="section-head">
            <h2 class="section-title">专注计时</h2>
          </div>
          <div class="card" style="padding:20px">
            <div id="focusIdle">
              <div class="form-row" style="gap:8px">
                <div class="form-group" style="margin:0;flex:1">
                  <label>学习时长</label>
                  <select id="focusDuration" style="padding:10px;font-size:14px">
                    <option value="15">15 分钟</option>
                    <option value="25" selected>25 分钟</option>
                    <option value="45">45 分钟</option>
                    <option value="60">60 分钟</option>
                  </select>
                </div>
                <div class="form-group" style="margin:0;flex:1">
                  <label>休息时长</label>
                  <select id="breakDuration" style="padding:10px;font-size:14px">
                    <option value="5">5 分钟</option>
                    <option value="10" selected>10 分钟</option>
                    <option value="15">15 分钟</option>
                  </select>
                </div>
              </div>
              <button class="btn-checkin" id="btnFocusIdle" onclick="startFocus()" style="margin-top:12px">开始专注</button>
            </div>
            <div id="focusActive" style="display:none;text-align:center">
              <div id="focusPhase" style="font-size:14px;font-weight:600;color:var(--accent);margin-bottom:8px">学习中</div>
              <div id="focusCountdown" style="font-size:40px;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums">25:00</div>
              <div style="height:4px;background:var(--border);border-radius:2px;margin:12px 0;overflow:hidden">
                <div id="focusBar" style="height:100%;width:100%;background:var(--accent);border-radius:2px;transition:width 0.5s"></div>
              </div>
              <div style="display:flex;gap:8px;margin-top:12px">
                <button class="btn-secondary" id="btnFocusPause" onclick="pauseFocus()" style="flex:1;padding:10px">暂停</button>
                <button class="btn-secondary" id="btnFocusEnd" onclick="endFocus()" style="flex:1;padding:10px;border-color:#ef4444;color:#ef4444">结束</button>
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title">今日记录</h2>
          </div>
          <div class="card" id="todaySessionList">
            <div class="placeholder" style="padding:24px 0"><p>还没有学习记录</p></div>
          </div>
        </section>
        <section class="section">
          <div class="section-head">
            <h2 class="section-title">打卡日历</h2>
          </div>
          <div class="card" style="padding:16px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <button class="nav-btn" onclick="prevMonth()">◀</button>
              <span id="calendarTitle" style="font-weight:600;font-size:16px"></span>
              <button class="nav-btn" onclick="nextMonth()">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div style="margin-top:16px;text-align:center">
              <span id="streakDisplay" style="font-size:32px;font-weight:700;color:var(--accent)">0</span>
              <span style="font-size:14px;color:var(--text-secondary);margin-left:4px">天连续打卡</span>
            </div>
          </div>
        </section>
      </div>

      <div id="view-stats" class="view">
        <section class="section">
          <div class="section-head">
            <h2 class="section-title">学习统计</h2>
          </div>
          <div class="card" style="padding:16px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <button class="nav-btn" onclick="prevWeek()">◀</button>
              <div style="text-align:center">
                <div id="weekLabel" style="font-weight:600;font-size:15px"></div>
                <div id="weekRange" style="font-size:12px;color:var(--text-secondary);margin-top:2px"></div>
              </div>
              <button class="nav-btn" onclick="nextWeek()">▶</button>
            </div>
            <canvas id="statsChart" width="400" height="200"></canvas>
            <div style="display:flex;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
              <div style="flex:1;text-align:center">
                <div id="statsTotal" style="font-size:22px;font-weight:700;color:var(--accent)">0</div>
                <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">本周总时</div>
              </div>
              <div style="flex:1;text-align:center">
                <div id="statsAvg" style="font-size:22px;font-weight:700;color:var(--accent)">0</div>
                <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">日均学习</div>
              </div>
              <div style="flex:1;text-align:center">
                <div id="statsBest" style="font-size:22px;font-weight:700;color:#22c55e">0</div>
                <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">单日最高</div>
              </div>
            </div>
          </div>
        </section>
        <section class="section">
          <div class="section-head">
            <h2 class="section-title">本周进度</h2>
          </div>
          <div class="card" style="padding:20px;text-align:center">
            <div id="progressRing" style="margin:0 auto"></div>
            <div style="margin-top:8px;font-size:13px;color:var(--text-secondary)">
              目标: <span id="goalDisplay">600</span> 分钟/周
              <button class="btn-link" onclick="editGoal()" style="font-size:12px">修改</button>
            </div>
          </div>
        </section>
        <section class="section">
          <button class="btn-secondary" onclick="resetWeek()" style="width:100%;border-color:#ef4444;color:#ef4444">重置到第1周</button>
        </section>
      </div>

      <div id="view-schedule" class="view">
        <section class="section">
          <div class="section-head">
            <h2 class="section-title">本周课表</h2>
            <button class="btn-link" onclick="openAddCourse()">+ 添加</button>
          </div>
          <div class="day-tabs" id="dayTabs"></div>
          <div class="card schedule-list" id="fullScheduleList"></div>
        </section>
      </div>

    </main>

    <nav id="tab-bar">
      <button class="tab-btn active" data-view="home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="tab-label">首页</span>
      </button>
      <button class="tab-btn" data-view="checkin">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span class="tab-label">打卡</span>
      </button>
      <button class="tab-btn" data-view="stats">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="tab-label">统计</span>
      </button>
      <button class="tab-btn" data-view="schedule">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="tab-label">课表</span>
      </button>
    </nav>
  </div>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
    <!-- 添加课程弹窗 -->
    <div class="modal-overlay" id="addCourseModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>添加课程</h3>
          <button class="modal-close" onclick="closeAddCourse()">✖</button>
        </div>
        <div class="form-group">
          <label>课程名称</label>
          <input type="text" id="courseName" placeholder="如：高等数学">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>星期</label>
            <select id="courseDay">
              <option value="1">周一</option>
              <option value="2">周二</option>
              <option value="3">周三</option>
              <option value="4">周四</option>
              <option value="5">周五</option>
              <option value="6">周六</option>
              <option value="0">周日</option>
            </select>
          </div>
          <div class="form-group">
            <label>开始时间</label>
            <input type="time" id="courseStart" value="08:00">
          </div>
          <div class="form-group">
            <label>结束时间</label>
            <input type="time" id="courseEnd" value="09:40">
          </div>
        </div>
        <div class="form-group">
          <label>地点</label>
          <input type="text" id="courseLocation" placeholder="如：301教室">
        </div>
        <div class="form-group">
          <label>重要度</label>
          <div class="level-group" id="courseLevel">
            <label class="level-option active" data-level="t1">
              <span class="level-dot t1"></span>
              <span>T1 重要</span>
            </label>
            <label class="level-option" data-level="t2">
              <span class="level-dot t2"></span>
              <span>T2 中等</span>
            </label>
            <label class="level-option" data-level="t3">
              <span class="level-dot t3"></span>
              <span>T3 轻松</span>
            </label>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn-secondary" onclick="closeAddCourse()" style="flex:1">取消</button>
          <button class="btn-checkin" onclick="saveCourse()" style="flex:2">保存</button>
        </div>
      </div>
    </div>

    <!-- 添加计划弹窗 -->
    <div class="modal-overlay" id="addPlanModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>添加计划</h3>
          <button class="modal-close" onclick="closeAddPlan()">✖</button>
        </div>
        <div class="form-group">
          <label>计划内容</label>
          <input type="text" id="planContent" placeholder="如：复习高数第二章" maxlength="200">
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn-secondary" onclick="closeAddPlan()" style="flex:1">取消</button>
          <button class="btn-checkin" onclick="savePlan()" style="flex:2">保存</button>
        </div>
      </div>
    </div>

    <!-- 提醒弹窗 -->
    <div class="modal-overlay" id="alertModal">
      <div class="modal-content" style="text-align:center">
        <div style="font-size:48px;margin:20px 0">⏰</div>
        <div id="alertMessage" style="font-size:18px;font-weight:600;margin-bottom:20px"></div>
        <button class="btn-checkin" onclick="closeAlertModal()">知道了</button>
      </div>
    </div>

</body>
</html>
